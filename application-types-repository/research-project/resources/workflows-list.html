<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Running Workflows</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
  <style>
    :root {
      color-scheme: light dark;
      --mui-primary: #1976d2;
      --mui-primary-hover: rgba(25, 118, 210, 0.04);
      --mui-primary-active: rgba(25, 118, 210, 0.12);
      --mui-text: rgba(0, 0, 0, 0.87);
      --mui-text-secondary: rgba(0, 0, 0, 0.6);
      --mui-text-disabled: rgba(0, 0, 0, 0.38);
      --mui-divider: rgba(0, 0, 0, 0.12);
      --mui-bg: #ffffff;
      --mui-bg-elevated: #ffffff;
      --mui-hover: rgba(0, 0, 0, 0.04);
      --mui-state-bg: rgba(25, 118, 210, 0.08);
      --mui-state-fg: #0d47a1;
      --mui-state-waiting-bg: rgba(237, 108, 2, 0.12);
      --mui-state-waiting-fg: #b26500;
      --mui-state-final-bg: rgba(46, 125, 50, 0.12);
      --mui-state-final-fg: #1b5e20;
      --mui-outlined-border: rgba(25, 118, 210, 0.5);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --mui-primary: #90caf9;
        --mui-primary-hover: rgba(144, 202, 249, 0.08);
        --mui-primary-active: rgba(144, 202, 249, 0.16);
        --mui-text: rgba(255, 255, 255, 0.87);
        --mui-text-secondary: rgba(255, 255, 255, 0.6);
        --mui-text-disabled: rgba(255, 255, 255, 0.38);
        --mui-divider: rgba(255, 255, 255, 0.12);
        --mui-bg: #121212;
        --mui-bg-elevated: #1e1e1e;
        --mui-hover: rgba(255, 255, 255, 0.08);
        --mui-state-bg: rgba(144, 202, 249, 0.16);
        --mui-state-fg: #90caf9;
        --mui-state-waiting-bg: rgba(255, 167, 38, 0.16);
        --mui-state-waiting-fg: #ffb74d;
        --mui-state-final-bg: rgba(102, 187, 106, 0.16);
        --mui-state-final-fg: #81c784;
        --mui-outlined-border: rgba(144, 202, 249, 0.5);
      }
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--mui-bg);
      color: var(--mui-text);
      font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.43;
      letter-spacing: 0.01071em;
      width: 100%;
    }
    body { padding: 16px 24px 24px 24px; }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-bottom: 8px;
      min-height: 32px;
    }

    /* MUI text-button (outlined) */
    .btn {
      font-family: inherit;
      font-size: 0.8125rem;
      font-weight: 500;
      line-height: 1.75;
      letter-spacing: 0.02857em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid var(--mui-outlined-border);
      background: transparent;
      color: var(--mui-primary);
      cursor: pointer;
      transition: background-color 150ms cubic-bezier(0.4,0,0.2,1),
                  border-color 150ms cubic-bezier(0.4,0,0.2,1);
    }
    .btn:hover {
      background-color: var(--mui-primary-hover);
      border-color: var(--mui-primary);
    }
    .btn:active { background-color: var(--mui-primary-active); }
    .btn:disabled {
      color: var(--mui-text-disabled);
      border-color: var(--mui-divider);
      cursor: not-allowed;
      background: transparent;
    }

    .btn-text {
      border: none;
      padding: 6px 8px;
    }

    /* States */
    .loading, .empty, .err {
      padding: 32px 16px;
      text-align: center;
      color: var(--mui-text-secondary);
      font-size: 0.875rem;
    }
    .err { color: #d32f2f; }

    /* Table — MUI density */
    .paper {
      background: var(--mui-bg-elevated);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 2px 1px -1px rgba(0,0,0,0.2),
                  0 1px 1px 0 rgba(0,0,0,0.14),
                  0 1px 3px 0 rgba(0,0,0,0.12);
    }
    .table-wrap { width: 100%; overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: auto;
    }
    thead th {
      font-weight: 500;
      font-size: 0.875rem;
      color: var(--mui-text-secondary);
      text-align: left;
      padding: 16px;
      border-bottom: 1px solid var(--mui-divider);
      background: var(--mui-bg-elevated);
      white-space: nowrap;
    }
    tbody td {
      font-size: 0.875rem;
      color: var(--mui-text);
      padding: 16px;
      border-bottom: 1px solid var(--mui-divider);
      vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr {
      transition: background-color 150ms cubic-bezier(0.4,0,0.2,1);
    }
    tbody tr:hover { background-color: var(--mui-hover); }

    .wf-name {
      font-weight: 500;
      color: var(--mui-text);
      line-height: 1.43;
    }
    .wf-id {
      font-size: 0.75rem;
      color: var(--mui-text-secondary);
      margin-top: 2px;
      font-family: 'Roboto Mono', monospace;
    }

    /* Chip — MUI filled */
    .chip {
      display: inline-flex;
      align-items: center;
      height: 24px;
      padding: 0 10px;
      border-radius: 16px;
      font-size: 0.8125rem;
      font-weight: 500;
      line-height: 1.4;
      background: var(--mui-state-bg);
      color: var(--mui-state-fg);
      white-space: nowrap;
    }
    .chip.waiting { background: var(--mui-state-waiting-bg); color: var(--mui-state-waiting-fg); }
    .chip.final   { background: var(--mui-state-final-bg);   color: var(--mui-state-final-fg); }

    .updated { color: var(--mui-text-secondary); font-size: 0.8125rem; white-space: nowrap; }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
    }

    /* Responsive: collapse extra columns on narrow widths */
    @media (max-width: 720px) {
      body { padding: 12px; }
      thead th, tbody td { padding: 12px 10px; }
      .col-updated { display: none; }
    }
    @media (max-width: 520px) {
      .col-id { display: none; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button class="btn btn-text" id="refresh-btn" type="button">Refresh</button>
  </div>
  <div id="content" class="loading">Loading…</div>

  <script>
    __EXT_APPS_BUNDLE__
  </script>

  <script>
  (function () {
    function whenReady(cb) {
      if (window.__mcpApps && window.__mcpApps.App) return cb();
      let tries = 0;
      const t = setInterval(() => {
        if (window.__mcpApps && window.__mcpApps.App) {
          clearInterval(t);
          cb();
        } else if (++tries > 50) {
          clearInterval(t);
          render({ error: 'MCP Apps SDK did not load' });
        }
      }, 50);
    }

    let app = null;
    let project = null;

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => (
        { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
      ));
    }

    function render(state) {
      const root = document.getElementById('content');
      if (state.error) {
        root.className = 'err';
        root.textContent = state.error;
        return;
      }
      if (state.loading) {
        root.className = 'loading';
        root.textContent = state.loading;
        return;
      }
      const workflows = state.workflows || [];
      if (workflows.length === 0) {
        root.className = 'empty';
        root.textContent = project
          ? 'No workflows in project "' + project + '".'
          : 'No workflows.';
        return;
      }
      root.className = '';
      const rows = workflows.map(wf => {
        const chipCls = wf.isFinal ? 'chip final' : wf.isWaiting ? 'chip waiting' : 'chip';
        const buttons = (wf.availableEvents || []).map(ev =>
          '<button class="btn" type="button" data-id="' + escapeHtml(wf.id) + '" data-evt="' + escapeHtml(ev) + '">' + escapeHtml(ev) + '</button>'
        ).join('');
        const updated = wf.updatedAt ? new Date(wf.updatedAt).toLocaleString() : '';
        return '<tr>'
          + '<td>'
              + '<div class="wf-name">' + escapeHtml(wf.name || wf.id) + '</div>'
              + '<div class="wf-id col-id">' + escapeHtml(wf.id) + '</div>'
          + '</td>'
          + '<td><span class="' + chipCls + '">' + escapeHtml(wf.stateLabel || wf.currentState) + '</span></td>'
          + '<td class="updated col-updated">' + escapeHtml(updated) + '</td>'
          + '<td><div class="actions">' + (buttons || '<span class="updated">—</span>') + '</div></td>'
          + '</tr>';
      }).join('');
      root.innerHTML =
        '<div class="paper"><div class="table-wrap"><table>'
        + '<thead><tr>'
            + '<th>Workflow</th>'
            + '<th>State</th>'
            + '<th class="col-updated">Updated</th>'
            + '<th style="text-align:right">Actions</th>'
        + '</tr></thead>'
        + '<tbody>' + rows + '</tbody>'
        + '</table></div></div>';

      root.querySelectorAll('button.btn[data-id]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.getAttribute('data-id');
          const evt = btn.getAttribute('data-evt');
          root.querySelectorAll('button.btn').forEach(b => b.disabled = true);
          try {
            await app.callServerTool({
              name: 'workflow_send_event',
              arguments: { project_name: project, workflow_id: id, event: evt }
            });
            await refresh();
          } catch (err) {
            console.error('workflow_send_event failed', err);
            render({ error: 'Failed to send event: ' + (err && err.message || err) });
          }
        });
      });
    }

    function extractResult(result) {
      const content = result && result.content;
      if (!Array.isArray(content)) return null;
      const text = content.find(c => c && c.type === 'text');
      if (!text) return null;
      try {
        let parsed = JSON.parse(text.text);
        if (Array.isArray(parsed) && parsed.length > 0 && parsed[0] && parsed[0].type === 'text' && parsed[0].text) {
          parsed = JSON.parse(parsed[0].text);
        }
        return parsed;
      } catch {
        return null;
      }
    }

    async function refresh() {
      render({ loading: 'Loading workflows…' });
      try {
        const result = await app.callServerTool({
          name: 'workflow_list',
          arguments: { project_name: project }
        });
        const payload = extractResult(result);
        const workflows = Array.isArray(payload) ? payload : (payload && payload.workflows) || [];
        render({ workflows });
      } catch (err) {
        console.error('workflow_list failed', err);
        render({ error: 'Failed to load workflows: ' + (err && err.message || err) });
      }
    }

    function reportHeight() {
      try {
        if (!app || !app.sendSizeChanged) return;
        // Report height only — leaving width unset lets the host iframe stay 100% width.
        const h = Math.min(document.documentElement.scrollHeight, 800);
        app.sendSizeChanged({ height: h });
      } catch {}
    }

    whenReady(async () => {
      const { App, PostMessageTransport } = window.__mcpApps;
      try {
        // autoResize:false stops the SDK from sending width — width must be 100% of the host iframe.
        app = new App(
          { name: 'workflows-list', version: '1.0.0' },
          { tools: {} },
          { autoResize: false }
        );
        await app.connect(new PostMessageTransport(window.parent, window.parent));

        // Manual height reporting on body mutations.
        const ro = new ResizeObserver(() => reportHeight());
        ro.observe(document.body);
        ro.observe(document.documentElement);
        window.addEventListener('load', reportHeight);
        setTimeout(reportHeight, 100);
        const hostCtx = app.getHostContext() || {};
        const toolArgs = hostCtx.toolInfo && hostCtx.toolInfo.tool && hostCtx.toolInfo.tool.input
          ? hostCtx.toolInfo.tool.input
          : (hostCtx.toolInfo && hostCtx.toolInfo.args) || {};
        project = toolArgs.project_name || hostCtx.project || null;

        app.ontoolinput = (params) => {
          const args = params && params.arguments;
          if (args && args.project_name) {
            project = args.project_name;
            refresh();
          }
        };

        if (project) {
          await refresh();
        } else {
          render({ error: 'No project context provided' });
        }

        document.getElementById('refresh-btn').addEventListener('click', refresh);
      } catch (err) {
        console.error('MCP App connect failed', err);
        render({ error: 'Connect failed: ' + (err && err.message || err) });
      }
    });
  })();
  </script>
</body>
</html>
